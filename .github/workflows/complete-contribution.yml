name: 🚀 Complete Contribution System

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC
    - cron: '0 14 * * *'  # 14:00 UTC
    - cron: '0 20 * * *'  # 20:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  generate-contributions:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
    steps:
      - name: Verify personal GH_TOKEN3 secret
        run: |
          if [ -z "${GH_TOKEN3}" ]; then
            echo "❌ GH_TOKEN3 secret is not configured. Add your personal GitHub token to repository Secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN3 }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure Git user
        run: |
          git config --global user.email "ramincsy2@gmail.com"
          git config --global user.name "ramincsy"

      - name: Get current date info
        run: |
          echo "day=$(date +'%d')" >> $GITHUB_ENV
          echo "month=$(date +'%m')" >> $GITHUB_ENV
          echo "year=$(date +'%Y')" >> $GITHUB_ENV
          echo "hour=$(date +'%H')" >> $GITHUB_ENV
          echo "minute=$(date +'%M')" >> $GITHUB_ENV
          echo "second=$(date +'%S')" >> $GITHUB_ENV

      - name: Clean workspace
        run: |
          git clean -fd
          git reset --hard HEAD

      - name: Generate 50 contribution files
        run: python scripts/generate_multiple_contributions.py 50

      - name: Create 50 contribution branches
        run: python scripts/create_contribution_branches.py 50

      - name: Create 50 PRs
        run: python scripts/create_multiple_prs.py 50
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}

      - name: Add code reviews to PRs
        run: python scripts/advanced_code_review.py 30
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}

      - name: Approve PRs
        run: python scripts/review_contributions.py 30
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}

      - name: Create GitHub issues
        run: echo "Issues creation skipped - script not implemented yet"
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "✨ Complete contribution system: 50 commits + 50 PRs + 30 reviews + 20 issues" || echo "No changes to commit"
          git push origin main

  auto-merge:
    needs: generate-contributions
    runs-on: ubuntu-latest
    env:
      GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
    steps:
      - name: Verify personal GH_TOKEN3 secret
        run: |
          if [ -z "${GH_TOKEN3}" ]; then
            echo "❌ GH_TOKEN3 secret is not configured. Add your personal GitHub token to repository Secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN3 }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure Git user
        run: |
          git config --global user.email "ramincsy2@gmail.com"
          git config --global user.name "ramincsy"

      - name: Wait for reviews to complete
        run: sleep 60

      - name: Auto-merge PRs
        run: python scripts/auto_merge_prs.py
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}