name: Run All Workflows

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-all:
    runs-on: ubuntu-22.04
    steps:
      - name: Verify token
        run: |
          if [ -z "${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}" ]; then
            echo "❌ GH_TOKEN3 or GITHUB_TOKEN secret is not configured. Add a personal token to repository secrets."
            exit 1
          fi

      - name: Trigger all workflows
        env:
          WORKFLOW_TOKEN: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          workflows=(
            "code-quality.yml"
            "complete-contribution.yml"
            "daily-contribution.yml"
            "auto-merge.yml"
            "weekly-quality.yml"
          )

          for wf in "${workflows[@]}"; do
            echo "Dispatching $wf..."
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${WORKFLOW_TOKEN}" \
              https://api.github.com/repos/${REPO}/actions/workflows/${wf}/dispatches \
              -d '{"ref":"main"}')

            if [ "$response" != "204" ]; then
              echo "❌ Failed to dispatch $wf (HTTP $response)"
              exit 1
            fi
            echo "✅ Dispatched $wf"
          done
