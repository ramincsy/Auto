name: Daily Contributions - 20 Commits per Day

on:
  schedule:
    - cron: '0 0 * * *'   # Run at 00:00 UTC (morning)
    - cron: '0 12 * * *'  # Run at 12:00 UTC (afternoon)
  workflow_dispatch:      # Allow manual trigger

jobs:
  make-contribution:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN3 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Configure Git user
        run: |
          git config --global user.email "ramincsy2@gmail.com"
          git config --global user.name "ramincsy"

      - name: Get current date info
        run: |
          echo "day=$(date +'%d')" >> $GITHUB_ENV
          echo "month=$(date +'%m')" >> $GITHUB_ENV
          echo "year=$(date +'%Y')" >> $GITHUB_ENV
          echo "hour=$(date +'%H')" >> $GITHUB_ENV

      - name: Clean working directory
        run: |
          git stash || true
          git clean -fd
          git reset --hard origin/main
          git clean -fd

      - name: Generate 20 contribution files
        run: |
          python scripts/generate_multiple_contributions.py 20 || echo "Generation completed"

      - name: Create 20 contribution branches
        run: |
          python scripts/create_contribution_branches.py || echo "Branches created"

      - name: Create 20 contribution PRs
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/create_multiple_prs.py || echo "PRs creation completed"

      - name: Review contribution PRs
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/review_contributions.py || echo "Review completed"

  auto-merge:
    runs-on: ubuntu-latest
    needs: make-contribution
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN3 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Auto-merge daily PRs
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/auto_merge_prs.py || echo "Auto-merge completed"
