name: Daily Contributions (Safe)

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-contribution
  cancel-in-progress: false

jobs:
  make-contribution:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Configure Git user
        run: |
          git config user.email "ramincsy2@gmail.com"
          git config user.name "ramincsy"

      - name: Get current date info
        run: |
          echo "day=$(date +'%d')" >> $GITHUB_ENV
          echo "month=$(date +'%m')" >> $GITHUB_ENV
          echo "year=$(date +'%Y')" >> $GITHUB_ENV
          echo "hour=$(date +'%H')" >> $GITHUB_ENV
          echo "minute=$(date +'%M')" >> $GITHUB_ENV
          echo "second=$(date +'%S')" >> $GITHUB_ENV
          echo "branch_name=daily-contribution-$(date +'%Y-%m-%d-%H')" >> $GITHUB_ENV

      - name: Prepare branch
        run: |
          git fetch origin
          git checkout -B "$branch_name" origin/main

      - name: Generate daily content
        env:
          AUTO_UPDATE_README: "false"
        run: |
          python generate_content.py || echo "No content generated."

      - name: Commit changes if any
        id: commit_changes
        run: |
          git add updates README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily update: ${year}-${month}-${day} ${hour}" || echo "Nothing new to commit"
            git push origin "$branch_name"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create single main PR
        if: steps.commit_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
          script: |
            const branchName = process.env.branch_name;
            const period = Number(process.env.hour) < 12 ? 'morning' : 'afternoon';
            const prBody = '# Daily Update: ' + process.env.year + '-' + process.env.month + '-' + process.env.day + ' ' + process.env.hour + ':' + process.env.minute + ':' + process.env.second + '\n\n' +
              '## Changes\n' +
              '- Daily contribution recorded\n' +
              '- Generated update file: updates/' + process.env.year + '/' + process.env.month + '/' + process.env.day + '-' + period + '.md\n' +
              '- README updates disabled in scheduled runs to reduce merge conflicts\n\n' +
              '## Purpose\n' +
              'This PR keeps the daily contribution flow active while reducing conflict risk.\n\n' +
              '## Quality Checks\n' +
              '- Code formatted with Black\n' +
              '- Linted with Ruff\n' +
              '- Daily idempotent entries\n' +
              '- Lower conflict risk on README.md\n\n' +
              '---\n' +
              '*Auto-generated by daily-contribution workflow*';

            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Daily Update ' + process.env.year + '-' + process.env.month + '-' + process.env.day + ' ' + process.env.hour,
                head: branchName,
                base: 'main',
                body: prBody,
              });
              console.log('Created main PR #' + pr.data.number);
            } catch (e) {
              console.log('Main PR creation skipped: ' + e.message);
            }
