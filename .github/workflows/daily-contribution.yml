name: 🚀 Complete Contribution System - 650+ Activities/Day

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC (11:30 Tehran)
    - cron: '0 14 * * *'  # 14:00 UTC (17:30 Tehran)
    - cron: '0 20 * * *'  # 20:00 UTC (23:30 Tehran)
  workflow_dispatch:      # Manual trigger

jobs:
  full-contribution-system:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN3 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Configure Git user
        run: |
          git config --global user.email "ramincsy2@gmail.com"
          git config --global user.name "ramincsy"

      - name: Get current date info
        run: |
          echo "day=$(date +'%d')" >> $GITHUB_ENV
          echo "month=$(date +'%m')" >> $GITHUB_ENV
          echo "year=$(date +'%Y')" >> $GITHUB_ENV
          echo "hour=$(date +'%H')" >> $GITHUB_ENV

      - name: 🧹 Clean working directory
        run: |
          git stash || true
          git clean -fd
          git reset --hard origin/main
          git clean -fd

      # ✅ COMMITS: 50 per execution
      - name: "📝 Step 1: Generate 50 contribution files"
        run: |
          python scripts/generate_multiple_contributions.py 50 || echo "Generation completed"

      - name: "🌿 Step 2: Create 50 contribution branches"
        run: |
          python scripts/create_contribution_branches.py || echo "Branches created"

      # ✅ PULL REQUESTS: 50 per execution
      - name: "🔗 Step 3: Create 50 pull requests"
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/create_multiple_prs.py || echo "PRs creation completed"

      # ✅ CODE REVIEWS: 30+ per execution (detailed)
      - name: "✅ Step 4: Add detailed code reviews"
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/review_contributions.py || echo "Review completed"

      - name: "🎓 Step 5: Add advanced technical reviews"
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/advanced_code_review.py || echo "Advanced review completed"

      # ✅ ISSUES: 20+ per execution (create + close)
      - name: "🎯 Step 6: Create and manage GitHub issues"
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/create_github_issues.py || echo "Issues creation completed"

  # Auto-merge all PRs after 1 hour
  auto-merge:
    runs-on: ubuntu-latest
    needs: full-contribution-system
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN3 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ⚡ Auto-merge all contribution PRs
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 }}
        run: |
          python scripts/auto_merge_prs.py || echo "Auto-merge completed"
