name: Daily Contributions (Safe)

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      bulk_mode:
        description: 'Enable high-volume contribution helpers'
        required: false
        default: false
        type: boolean

jobs:
  make-contribution:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install pre-commit
        run: |
          pip install pre-commit

      - name: Run pre-commit checks
        run: |
          pre-commit run --all-files --verbose || true

      - name: Configure Git user
        run: |
          git config user.email "ramincsy2@gmail.com"
          git config user.name "ramincsy"

      - name: Get current date info
        run: |
          echo "day=$(date +'%d')" >> $GITHUB_ENV
          echo "month=$(date +'%m')" >> $GITHUB_ENV
          echo "year=$(date +'%Y')" >> $GITHUB_ENV
          echo "hour=$(date +'%H')" >> $GITHUB_ENV
          echo "minute=$(date +'%M')" >> $GITHUB_ENV
          echo "second=$(date +'%S')" >> $GITHUB_ENV
          echo "branch_name=daily-contribution-$(date +'%Y-%m-%d-%H')" >> $GITHUB_ENV

      - name: Prepare branch
        run: |
          git fetch origin
          git checkout -B "$branch_name" origin/main

      - name: Generate daily content
        env:
          AUTO_UPDATE_README: "false"
        run: |
          python generate_content.py || echo "No content generated."

      - name: Generate multiple contributions (manual bulk mode)
        if: github.event_name == 'workflow_dispatch' && inputs.bulk_mode == true
        env:
          BULK_COUNT: "20"
        run: |
          python scripts/generate_multiple_contributions.py || echo "Multiple contributions generated."

      - name: Create multiple contribution branches (manual bulk mode)
        if: github.event_name == 'workflow_dispatch' && inputs.bulk_mode == true
        env:
          BULK_COUNT: "20"
        run: |
          python scripts/create_contribution_branches.py || echo "Branches created."

      - name: Commit changes if any
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update: ${year}-${month}-${day} ${hour}" || echo "Nothing new to commit"
            git push origin "$branch_name"
          fi

      - name: Create single main PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
          script: |
            const branchName = process.env.branch_name;
            const period = Number(process.env.hour) < 12 ? 'morning' : 'afternoon';
            const prBody = '# Daily Update: ' + process.env.year + '-' + process.env.month + '-' + process.env.day + ' ' + process.env.hour + ':' + process.env.minute + ':' + process.env.second + '\n\n' +
              '## Changes\n' +
              '- Daily contribution recorded\n' +
              '- Generated update file: updates/' + process.env.year + '/' + process.env.month + '/' + process.env.day + '-' + period + '.md\n' +
              '- README updates disabled in scheduled runs to reduce merge conflicts\n\n' +
              '## Purpose\n' +
              'This PR keeps the daily contribution flow active while reducing conflict risk.\n\n' +
              '## Quality Checks\n' +
              '- Code formatted with Black\n' +
              '- Linted with Ruff\n' +
              '- Daily idempotent entries\n' +
              '- Lower conflict risk on README.md\n\n' +
              '---\n' +
              '*Auto-generated by daily-contribution workflow*';

            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Daily Update ' + process.env.year + '-' + process.env.month + '-' + process.env.day + ' ' + process.env.hour,
                head: branchName,
                base: 'main',
                body: prBody,
              });
              console.log('Created main PR #' + pr.data.number);
            } catch (e) {
              console.log('Main PR creation skipped: ' + e.message);
            }

      - name: Create multiple contribution PRs
        if: github.event_name == 'workflow_dispatch' && inputs.bulk_mode == true
        env:
          BULK_COUNT: "20"
        run: |
          python scripts/create_multiple_prs.py || echo "Multiple PRs creation attempt completed."

      - name: Review contribution PRs
        if: github.event_name == 'workflow_dispatch' && inputs.bulk_mode == true
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
        run: |
          python scripts/review_contributions.py || echo "PR review attempt completed."
