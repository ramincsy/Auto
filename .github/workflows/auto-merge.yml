name: Auto Merge Daily PRs

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-merge-daily-prs
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Resolve conflicts in old PRs
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          echo "🔧 Attempting to resolve conflicts in existing PRs..."
          python scripts/resolve_conflicts.py --auto-resolve || true
          echo "✅ Conflict resolution attempt completed (may have failed PRs)"

      - name: Auto-merge daily PRs
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN3 || secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Starting auto-merge process..."
          python scripts/auto_merge_prs.py

      - name: Report results
        if: always()
        run: |
          echo "✨ Auto-merge workflow completed"
          echo "📊 Check logs above for detailed results"
